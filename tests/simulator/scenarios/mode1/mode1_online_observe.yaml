mode: 1
name: mode1_online_observe
seed: 7
mode1:
  runner: online
  seq_strategy: source_seq
  validation:
    strict_fail: false
    required_branches:
      - transcript.ok
      - transcript.drop_timeout
      - transcript.drop_error
      - analysis.ok
      - analysis.drop_timeout
      - analysis.drop_error
      - context.full18_ready
      - context.timeout_wait_full18
      - context.timeout_wait_recent4
      - recovery.true
      - recovery.false
      - retry.stt_gt1
      - retry.analysis_gt1
feed:
  mode: realtime
  drop: []
  duplicate: []
  reorder: []
  delay_backfill: []
  barriers:
    - after_seq: 3
      pause_sec: 2
